name: Scraper Automático Deportes Pro

on:
  schedule:
    # 1. BLOQUE MAÑANA (Fútbol Europeo)
    # Corre cada 15 min, desde las 07:30 AM hasta las 3:45 PM (Hora Venezuela)
    # En UTC es de 11:30 a 19:45
    - cron: '30/15 11-19 * * *'

    # 2. BLOQUE TARDE/NOCHE (NBA, MLB, MLS y Latam)
    # Corre cada 10 min, desde las 4:30 PM hasta las 03:50 AM (Hora Venezuela)
    # En UTC es de 20:30 a 07:50
    - cron: '30/10 20-23,0-7 * * *'

  workflow_dispatch: # Botón para ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar Scraper
        run: python auto_scraper.py

      - name: Guardar cambios y subir a GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Agrega los tres archivos generados
          git add nba.json mlb.json futbol.json
          # Commit si hay cambios, si no hay partidos nuevos no falla
          git commit -m "Actualización automática: Referer dinámico y Multi-deporte" || exit 0
          git push
