name: Scraper Automático Deportes Pro

on:
  schedule:
    - cron: '*/20 * * * *' # Ejecuta cada 20 minutos
  workflow_dispatch: # Botón para ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar Scraper
        run: python auto_scraper.py

      - name: Guardar cambios y subir a GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Agrega los tres archivos generados
          git add nba.json mlb.json futbol.json
          # Commit si hay cambios, si no hay partidos nuevos no falla
          git commit -m "Actualización automática: Referer dinámico y Multi-deporte" || exit 0
          git push
