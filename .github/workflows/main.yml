name: Scraper Automático Deportes

on:
  schedule:
    # '*/20' significa: ejecutar cada 20 minutos (minutos 0, 20 y 40 de cada hora)
    - cron: '*/20 * * * *' 
  workflow_dispatch: # Permite ejecución manual por si quieres forzar una actualización

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar Scraper
        run: python auto_scraper.py

      - name: Guardar cambios y subir a GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Se agregan los tres archivos para que se actualicen en el repositorio
          git add nba.json mlb.json futbol.json
          # Si no hay cambios reales en los links, no hace commit para no ensuciar el historial
          git commit -m "Actualización cada 20 min (NBA, MLB, Fútbol)" || exit 0
          git push
