<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlayCast PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --rd-red: #d90429; --rd-blue: #0077b6; --rd-bg: #ffffff; --rd-border: #eeeeee; }
        
        /* REPRODUCTOR PANTALLA COMPLETA TOTAL */
        #videoContainer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        video { width: 100%; height: auto; max-height: 100%; }
        
        /* BOTÓN VOLVER / CERRAR */
        #closePlayer { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(217, 4, 41, 0.8); color: #fff; border: none; 
            padding: 10px 20px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; z-index: 10000; font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* INTERFAZ */
        body { margin: 0; font-family: Arial, sans-serif; background: var(--rd-bg); }
        .playing-now #main-ui, .playing-now header, .playing-now footer { display: none !important; }
        header { background: var(--rd-red); padding: 15px; color: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header h1 { font-size: 18px; margin: 0; font-weight: 900; }
        table { width: 100%; border-collapse: collapse; }
        .cat-tag { background: #333; color: #fff; padding: 10px; font-size: 11px; text-transform: uppercase; }
        .channel-row { border-bottom: 1px solid var(--rd-border); }
        .vip-row { background: #fffcf0 !important; }
        td { padding: 15px; vertical-align: middle; }
        .channel-link { font-size: 15px; font-weight: bold; color: var(--rd-blue); text-decoration: none; }
        .btn-play { background: #222; color: #fff; padding: 10px 18px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-vip { background: var(--rd-red); }
        footer { padding: 30px; text-align: center; color: #bbb; font-size: 11px; }
    </style>
</head>
<body>

    <div id="videoContainer">
        <button id="closePlayer" onclick="stopStream()">← VOLVER A LA LISTA</button>
        <video id="video" controls playsinline crossorigin="anonymous"></video>
    </div>

    <header><h1>PLAYCAST LIVE</h1></header>

    <div id="main-ui">
        <table>
            <tbody id="channel-list">
                <tr class="cat-tag"><td colspan="3">Sincronizando canales...</td></tr>
            </tbody>
        </table>
    </div>

    <footer id="footer-text"></footer>

<script>
    const list = document.getElementById('channel-list');
    const video = document.getElementById('video');
    const container = document.getElementById('videoContainer');
    let hls;

    fetch('config.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('footer-text').innerText = data.footer_text;
            list.innerHTML = '<tr class="cat-tag"><td colspan="3">Canales de Venezuela</td></tr>';

            data.channels.forEach(ch => {
                const row = document.createElement('tr');
                const isVip = ch.is_vip;
                row.className = isVip ? 'channel-row vip-row' : 'channel-row';
                
                // Distancia random para publicidad
                const rPad = isVip ? Math.floor(Math.random() * (70 - 30 + 1)) + 30 : 15;

                row.innerHTML = `
                    <td style="width:40px; text-align:center;">${isVip ? '⭐' : '📺'}</td>
                    <td style="padding-top:${rPad}px; padding-bottom:${rPad}px;">
                        <span class="channel-link" style="${isVip ? 'color:var(--rd-red)' : ''}" onclick="${isVip ? `window.open('${ch.url}', '_blank')` : `playStream('${ch.url}')`}">${ch.name}</span>
                    </td>
                    <td style="text-align:right">
                        <button class="btn-play ${isVip ? 'btn-vip' : ''}" onclick="${isVip ? `window.open('${ch.url}', '_blank')` : `playStream('${ch.url}')`}">${isVip ? 'GO' : 'VER'}</button>
                    </td>
                `;
                list.appendChild(row);
            });
        });

    function playStream(url) {
        if(!url) return;
        document.body.classList.add('playing-now');
        container.style.display = 'flex';
        
        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    }

    function stopStream() {
        document.body.classList.remove('playing-now');
        container.style.display = 'none';
        video.pause();
        video.src = "";
        if (hls) hls.destroy();
    }
</script>

<script async="async" data-cfasync="false" src="https://pl29162788.profitablecpmratenetwork.com/17/3e/b5/173eb5fab095ceeab6dd66737d0b6d03.js"></script>

</body>
</html>
