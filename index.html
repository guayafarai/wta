<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="referrer" content="no-referrer">
  
  <title>PlayCast PRO</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230b0d12'/%3E%3Cpolygon points='10,8 26,16 10,24' fill='%23e63946'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>

  <div id="app">
    
    <header class="main-header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">PlayCast <span>PRO</span></span>
        </div>
        <div class="header-actions">
          <button id="notifBadge" class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main id="page-dashboard" class="page active">
      <div class="hero-section">
        <h1>Deportes en vivo</h1>
        <p>NBA, MLB y más sin interrupciones.</p>
      </div>

      <div class="search-bar">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Busca tu equipo o canal...">
        </div>
      </div>

      <nav class="category-tabs">
        <button class="tab-item active" data-cat="todos">Todos</button>
        <button class="tab-item" data-cat="futbol">Fútbol</button>
        <button class="tab-item" data-cat="nba">NBA</button>
        <button class="tab-item" data-cat="mlb">MLB</button>
      </nav>

      <div id="channel-list" class="channel-grid"></div>
    </main>

    <main id="page-player" class="page" style="display:none;">
      <div id="video-wrapper" class="video-container">
        
        <video id="video-player" playsinline controls style="display:none;"></video>
        
        <iframe 
          id="iframe-player" 
          class="player-frame" 
          style="display:none;" 
          sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" 
          allowfullscreen>
        </iframe>

        <div id="stream-loading" class="player-loader">
          <div class="spinner"></div>
          <span>Cargando señal...</span>
        </div>

        <div id="stream-error" class="player-error">
          <div class="error-content">
            <h2 id="error-title">Sin señal</h2>
            <p id="error-msg">Intenta nuevamente en unos instantes.</p>
            <button id="btn-retry-stream" class="btn-retry">🔄 Reintentar</button>
          </div>
        </div>

        <div id="player-overlay">
          <div class="player-top-bar">
            <button id="btn-back-player">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Canales
            </button>
            <span id="player-channel-name">—</span>
            <div id="live-badge"><span class="pulse-dot"></span>EN VIVO</div>
          </div>
          <div class="player-bottom-bar">
            <button class="player-action-btn" id="btn-fullscreen">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="player-info">
        <h3>Recomendados</h3>
        <div id="suggested-list" class="suggested-grid"></div>
      </div>
    </main>
  </div>

  <script src="js/router.js"></script>
  <script src="js/channels.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
