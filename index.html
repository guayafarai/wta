<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <title>PlayCast PRO</title>

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/player.css">

  <!-- HLS & DASH players -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dashjs@latest/dist/dash.all.min.js" defer></script>
</head>
<body>

<!-- ════════════════════════════════════════════════
     PAGE: DASHBOARD
     ════════════════════════════════════════════════ -->
<div id="page-dashboard" class="page active" style="display:block;">

  <!-- Header -->
  <header id="dashboard-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">▶</span>
        <span class="brand-name">PLAYCAST</span>
        <span class="brand-badge">PRO</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn notif-btn" id="notifBtn" title="Notificaciones" aria-label="Activar notificaciones">
          🔔
          <span class="notif-badge" id="notifBadge"></span>
        </button>
        <button class="icon-btn" id="viewToggleBtn" title="Cambiar vista" aria-label="Cambiar entre lista y cuadrícula">⊞</button>
      </div>
    </div>
  </header>

  <!-- Live strip -->
  <div class="live-strip" aria-live="polite">
    <span class="live-label"><span class="pulse-dot"></span> EN VIVO</span>
    <span class="live-ticker">Canales disponibles ahora mismo</span>
  </div>

  <!-- Search -->
  <div class="search-container">
    <div class="search-box" role="search">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search"
             id="channelSearch"
             placeholder="Buscar canal..."
             autocomplete="off"
             autocorrect="off"
             spellcheck="false"
             aria-label="Buscar canal">
      <button id="clearSearch" aria-label="Limpiar búsqueda">✕</button>
    </div>
  </div>

  <!-- Categories -->
  <div class="categories-container" id="categoriesContainer" role="tablist" aria-label="Categorías"></div>

  <!-- Main channel list -->
  <main id="dashboard-main" role="main">
    <div class="section-header">
      <span class="section-title">CANALES</span>
      <span class="channel-count" id="channelCount"></span>
    </div>
    <div id="channel-list" class="list-view" role="list" aria-label="Lista de canales"></div>
    <div id="emptyState" role="status">
      <div class="empty-icon" aria-hidden="true">📺</div>
      <p>No se encontraron canales</p>
    </div>
  </main>

  <!-- Footer -->
  <footer id="app-footer" aria-label="Pie de página">
    <span id="footerText"></span>
  </footer>

</div><!-- /page-dashboard -->


<!-- ════════════════════════════════════════════════
     PAGE: PLAYER
     ════════════════════════════════════════════════ -->
<div id="page-player" class="page" style="display:none;" aria-label="Reproductor de video">

  <!-- Video area -->
  <div id="video-wrapper" role="region" aria-label="Video en vivo">

    <!-- Video element (HLS / DASH / Direct) -->
    <video id="video-player"
           playsinline
           webkit-playsinline
           x5-playsinline
           preload="none"
           aria-label="Reproductor de video">
    </video>

    <!-- Iframe (YouTube / embeds)
         allow-same-origin + allow-scripts juntos generan advertencia de seguridad,
         por eso NO usamos sandbox aquí. La restricción viene del referrerpolicy. -->
    <iframe id="iframe-player"
            allowfullscreen
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
            referrerpolicy="no-referrer"
            title="Canal embebido">
    </iframe>

    <!-- Loading spinner -->
    <div id="stream-loading" role="status" aria-label="Cargando stream">
      <div class="spinner"></div>
    </div>

    <!-- Error state -->
    <div id="stream-error" role="alert">
      <div class="error-icon" aria-hidden="true">📡</div>
      <h3>Sin señal</h3>
      <p>No se pudo conectar al canal</p>
      <button id="btn-retry-stream" class="btn-retry">Reintentar</button>
    </div>

    <!-- Controls overlay (tap to show/hide) -->
    <div id="player-overlay" aria-label="Controles del reproductor">
      <!-- Top bar -->
      <div class="player-top-bar">
        <button id="btn-back-player" aria-label="Volver al inicio">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Canales
        </button>
        <span id="player-channel-name">—</span>
        <div id="live-badge" aria-label="Transmisión en vivo">
          <span class="pulse-dot" aria-hidden="true"></span>
          EN VIVO
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="player-bottom-bar">
        <button class="player-action-btn" id="btn-fullscreen" aria-label="Pantalla completa" title="Pantalla completa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /video-wrapper -->

  <!-- Sidebar / info panel (portrait: below; landscape: side) -->
  <div id="player-sidebar">
    <div class="player-info-panel">
      <h2>Canal</h2>
      <div class="player-meta">
        <span class="player-cat-badge">—</span>
      </div>

      <p class="related-title" id="related-title">MÁS CANALES</p>
      <div class="related-list" id="related-list"></div>
    </div>
  </div>

</div><!-- /page-player -->


<!-- ════════════════════════════════════════════════
     GLOBAL: Toast container
     ════════════════════════════════════════════════ -->
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>


<!-- ── Scripts ── -->
<script src="js/router.js"></script>
<script src="js/channels.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>

</body>
</html>
