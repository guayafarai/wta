<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlayCast PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
</head>
<body>

    <div id="videoContainer">
        <div id="playerTopBar">
            <button id="closePlayer" onclick="stopStream()">✕ Cerrar</button>
            <span id="playerTitle">—</span>
            <div id="liveIndicator"><span class="pulse-dot"></span> EN VIVO</div>
        </div>
        <video id="video" playsinline></video>
        <iframe id="embedPlayer" allow="autoplay; fullscreen" style="display:none; border:none; width:100%; height:100%;"></iframe>
        <div id="streamError">
            <p>⚠️ Error de conexión</p>
            <button onclick="retryStream()">Reintentar</button>
        </div>
    </div>

    <header>
        <div class="header-inner">
            <div class="brand">
                <span class="brand-logo">▶</span>
                <span class="brand-name">PLAYCAST PRO</span>
            </div>
            <button class="icon-btn" onclick="toggleView()">⊞</button>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="channelSearch" placeholder="Buscar canal..." oninput="filterAndRender()">
        </div>
    </div>

    <div class="categories-container" id="categoriesContainer"></div>

    <main id="main-ui">
        <div id="channel-list" class="list-view"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
